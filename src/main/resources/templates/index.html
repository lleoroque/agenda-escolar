<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Agenda Escolar</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#eef2f7;
            font-family:Arial, sans-serif;
        }

        .sidebar{
            width:240px;
            height:100vh;
            background:#0d6efd;
            position:fixed;
            left:0;
            top:0;
            padding:30px 20px;
            color:white;
        }

        .sidebar h2{
            font-weight:bold;
            margin-bottom:40px;
        }

        .sidebar p{
            opacity:0.8;
        }

        .conteudo{

            margin-left: 250px;

            padding: 20px;
        }

        .card-custom{

            background: white;

            border-radius: 20px;

            padding: 25px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.08);

            border: none;
        }

        .titulo{
            font-weight:bold;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-primary{
            border-radius:12px;
            padding:10px;
            font-weight:bold;
        }

        .table{
            vertical-align:middle;
        }

        .table thead{
            background:#0d6efd;
            color:white;
        }

        .table{
            border-radius:15px;
            overflow:hidden;
        }

        .btn-danger{
            border-radius:10px;
        }

        .status{
            background:#d1e7dd;
            color:#0f5132;
            padding:5px 12px;
            border-radius:20px;
            font-size:12px;
            font-weight:bold;
        }
        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .conteudo{
                margin-left:0;
                width:100%;
                padding:15px;
            }

            .mobile-gap{
                margin-bottom:10px;
            }

            .form-control{
                font-size:14px;
                padding:10px;
            }

            .btn{
                font-size:14px;
            }

            .table{
                font-size:12px;
            }

            td, th{
                white-space:nowrap;
            }
        }
    </style>

</head>

<body>

<div class="sidebar d-none d-md-flex">

    <h2>
        <i class="fa-solid fa-book"></i>
        Agenda
    </h2>

    <p>
        Organize provas, atividades e trabalhos escolares.
    </p>

</div>

<div class="conteudo container-fluid py-3 px-3">

<div class="d-flex justify-content-end align-items-center gap-2 mb-3">

        <span class="text-muted">
            Olá, <strong th:text="${nomeUsuario}"></strong>
        </span>

    <a href="/logout"
       class="btn btn-outline-danger btn-sm">

        Sair

    </a>

</div>

<div class="card border-0 shadow rounded-4 p-4">

    <h1 class="fw-bold text-primary fs-3">
        Nova Tarefa
        </h1>

        <form action="/salvar" method="post">

            <div class="row">

                <div class="col-12 col-md-3 mobile-gap">

                    <input type="text"
                           name="materia"
                           placeholder="Matéria"
                           class="form-control form-control-lg"
                           required>

                </div>

                <div class="col-12 col-md-4 mobile-gap">

                    <input type="text"
                           name="descricao"
                           placeholder="Descrição da atividade"
                           class="form-control form-control-lg"
                           required>

                </div>

                <div class="col-6 col-md-2 mobile-gap">

                    <select name="categoria"
                            class="form-control form-control-lg">

                        <option value="Prova">Prova</option>
                        <option value="Trabalho">Trabalho</option>
                        <option value="Atividade">Atividade</option>
                        <option value="Lembrete">Lembrete</option>

                    </select>

                </div>

                <div class="col-6 col-md-1 mobile-gap">

                    <select name="prioridade"
                            class="form-control">

                        <option selected disabled>
                            Prioridade
                        </option>

                        <option value="Alta">
                            Alta
                        </option>

                        <option value="Média">
                            Média
                        </option>

                        <option value="Baixa">
                            Baixa
                        </option>

                    </select>

                </div>

                <div class="col-6 col-md-2 mobile-gap">

                    <label class="text-muted small mb-1">

                        Data

                    </label>

                    <input type="date"

                           name="dataEntrega"

                           class="form-control">

                </div>

            </div>

            <button type="submit"
                    class="btn btn-primary btn-lg w-100 rounded-3 shadow-sm"
                    onclick="this.disabled=true; this.form.submit();">


            <i class="fa-solid fa-floppy-disk"></i>
                Salvar Tarefa

            </button>

        </form>

    </div>

    <div class="card-custom">

        <h2 class="titulo">
            Tarefas Pendentes
        </h2>


        <div class="table-responsive">

            <table class="table table-hover align-middle">

            <thead>

            <thead>

            <tr>

                <th>Matéria</th>

                <th class="d-none d-md-table-cell">
                    Descrição
                </th>

                <th>Categoria</th>

                <th>Prioridade</th>

                <th style="width: 120px;">Entrega</th>

                <th>Status</th>

                <th style="width:90px;">
                    Ações
                </th>

            </tr>

            </thead>

            </thead>

            <tbody>
                <tbody>

            <tr th:if="${#lists.isEmpty(tarefas)}">

                <td colspan="7" class="text-center py-5">

                    📚 Nenhuma tarefa cadastrada.
                    <br>
                    <small class="text-muted">
                        Crie sua primeira tarefa acima.
                    </small>

                </td>

            </tr>

            <tr th:each="tarefa : ${tarefas}">

                <td th:text="${tarefa.materia}"></td>

                <td class="d-none d-md-table-cell"
                    th:text="${tarefa.descricao}">
                </td>

                <td th:text="${tarefa.categoria}"></td>

                <td th:text="${tarefa.prioridade}"></td>

                <td style="white-space: nowrap;">

    <span th:if="${tarefa.dataEntrega != null}"
          th:text="${#temporals.format(tarefa.dataEntrega, 'dd/MM/yyyy')}">
    </span>

                    <span th:if="${tarefa.dataEntrega == null}"
                          class="badge bg-secondary">
        Sem prazo
    </span>

                </td>
                <td>

    <span th:if="${tarefa.status == 'Concluído'}"
          class="badge bg-success">

        Concluído

    </span>

                    <span th:if="${tarefa.status == 'Pendente'}"
                          class="badge bg-warning text-dark">

        Pendente

    </span>

                </td>

                <td class="text-nowrap">

                    <div class="d-flex gap-1">

                        <a th:href="@{/concluir/{id}(id=${tarefa.id})}"
                           class="btn btn-success btn-sm">

                            ✓

                        </a>

                        <a th:href="@{/deletar/{id}(id=${tarefa.id})}"
                           class="btn btn-danger btn-sm">

                            ✕

                        </a>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>
        </div>

    </div>

</div>

</body>

</html>
